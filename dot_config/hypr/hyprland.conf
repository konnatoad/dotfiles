# hyprland.conf
# this file gently persuades spacetime to arrange windows in rectangles
# if something breaks it's because the space noodles tied themselves in a knot again

env = GTK_THEME,Adwaita-dark

# three monitors stitched together like panels in the universe
# spacetime coordinates chosen by trial, error, and mild cosmic confusion
monitor = DP-2,1920x1080@143.98,-1080x-420,1,transform,3
workspace = 2, monitor:DP-2

monitor = DP-3,1920x1080@270.00,0x0,1
workspace = 1, monitor:DP-3

monitor = DP-1,2560x1440@59.95,1920x-180,1
workspace = 3, monitor:DP-1

# when the universe boots, immediately stare at this monitor
# otherwise your focus drifts somewhere between dimensions
exec-once = hyprctl dispatch focusmonitor DP-3

# preferred tools for navigating the spacetime noodle ecosystem
$terminal = ghostty
$fileManager = ghostty -e yazi
$menu = rofi -show drun
$browser = zen-browser

# spawn bar and wallpaper daemon
# they sit quietly at the edge of spacetime keeping the noodles aligned
exec-once = waybar & ~/.config/hypr/start-hyprpaper.sh & 

# cursor size: small arrow that pokes holes in spacetime
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
    # gaps between windows so the space noodles have room to wiggle
    gaps_in = 5
    gaps_out = 20

    # border thickness of the little spacetime boxes
    border_size = 2

    # glowing edges so windows look like they escaped a particle accelerator
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # resizing by border sometimes tears spacetime so we keep it calm
    resize_on_border = false

    # tearing is bad for the spacetime
    allow_tearing = false

    # dwindle layout: windows spiral around like polite space noodles
    layout = dwindle
}

decoration {
    # rounding so windows don't stab the fabric of spacetime with sharp corners
    rounding = 10
    rounding_power = 2

    # opacity stays solid because translucent noodles are unsettling
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        # shadows give windows depth like tiny gravity wells
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        # background blur so the desktop looks like it's seen through a cosmic fog
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    # animation engine: small ripples in spacetime whenever something moves
    enabled = yes, please :)

    # bezier curves: mathematics gently massaging the space noodles
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    # these values dictate how violently spacetime wiggles
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    # pseudotile keeps windows from stretching like overcooked noodles
    pseudotile = true
    preserve_split = true
}

master {
    # new windows bow respectfully to the master node
    new_status = master
}

misc {
    # hyprland mascot wallpapers disabled because they were bending spacetime too much
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

input {
    # keyboard layout summoned from your custom rune set
    kb_layout = custom_fi
    kb_variant = basic
    kb_model =
    kb_options =
    kb_rules =

    # cursor follows mouse like a loyal space noodle
    follow_mouse = 1

    # sensitivity neutral so spacetime doesn't jitter
    sensitivity = 0

    touchpad {
        # natural scroll: the universe flows downward when you push upward
        natural_scroll = true
        scroll_factor = 0.2
    }
}

device {
  # mouse tuned to glide through spacetime without overshooting galaxies
  name = vancer-vancer-akitsu-mouse-consumer-control-1
  sensitivity = -1.0
}

device {
    name = vancer-vancer-akitsu-mouse-1
    sensitivity = -1.0
}

device {
      # trackpad behaves differently because its noodles are flatter
      name = apple-inc.-magic-trackpad
      sensitivity = 0.2
      accel_profile = "adaptive"
}

$mainMod = SUPER # main spacetime manipulation key

# terminal portal
bind = $mainMod, RETURN, exec, $terminal

# remove a window from existence
bind = $mainMod, Q, killactive,

# exit hyprland and collapse the spacetime session
bind = $mainMod, M, exit,

# file manager wormhole
bind = $mainMod, E, exec, $fileManager

# floating window mode: detach noodle from the tiling soup
bind = $mainMod, V, togglefloating,

# launcher for applications drifting in your filesystem
bind = $mainMod, R, exec, $menu

# pseudotile toggle
bind = $mainMod, P, pseudo,

# split toggle for dwindle layout
bind = $mainMod ALT, J, togglesplit,

# browser gate
bind = $mainMod, B, exec, $browser

# screenshot spells capturing fragments of spacetime
bind = CTRL, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/area_$(date +%Y%m%d_%H%M%S).png && wl-copy < ~/Pictures/Screenshots/$(ls -t ~/Pictures/Screenshots | grep area_ | head -n1)

bind = ALT, Print, exec, grim /home/konna/Pictures/Screenshots/full_$(date +%Y%m%d_%H%M%S).png && wl-copy < /home/konna/Pictures/Screenshots/$(ls -t /home/konna/Pictures/Screenshots | grep full_ | head -n1)

# focus movement between windows drifting in spacetime
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# workspace portals
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# throw window through workspace wormholes
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# special hidden workspace pocket
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# scroll through workspaces like sliding along space noodles
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# drag windows around like loose satellites
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# audio controls adjusting vibrations in spacetime
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# brightness changes how strongly the universe shines
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# media controls steering the soundtrack of spacetime
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
